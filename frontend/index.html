<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Guyunusa IA Uruguaya — Inteligencia artificial con identidad uruguaya" />
  <meta name="theme-color" content="#1a4fa0" />
  <meta name="google-client-id" content="918788966563-d1lihvua7cgkn6urra1401ph0de7rk00.apps.googleusercontent.com" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Anti-flash: aplicar tema antes de que cargue el CSS -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('guyunusa_theme');
        var dark = t === 'dark' ||
          (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) { }
    })();
  </script>

  <link rel="icon" type="image/x-icon" href="assets/icons/guyunusa.ico" />
  <title>Guyunusa IA Uruguaya</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css"
    onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css'" />

  <style>
    .app-loading {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #faf9f6;
    }

    [data-theme="dark"] .app-loading {
      background: #1a1814;
    }

    .app-loading__sol {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      animation: sol-spin 2s linear infinite;
    }

    @keyframes sol-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .app-loading__text {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #9c9585;
    }

    [data-theme="dark"] .app-loading__text {
      color: #6b6254;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="app-loading">
      <img class="app-loading__sol" src="assets/images/guyunusa.png" alt="Guyunusa" width="72" height="72" />
      <span class="app-loading__text">Cargando Guyunusa...</span>
    </div>
  </div>

  <!--
    highlight.js — CDN primario: cdnjs. Si falla, onerror carga jsdelivr.
    onload dispara __hljsReady() para vaciar la cola de bloques pendientes
    (definida en frontend/js/utils/highlighter.js).
  -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"
    onload="window.__hljsReady && window.__hljsReady()"
    onerror="
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/highlight.min.js';
      s.onload = function(){ window.__hljsReady && window.__hljsReady(); };
      document.head.appendChild(s);
    "
  ></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
